<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Satori App</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GH Pages gets a request for a sub-path it doesn't have a file for,
    // it serves this 404.html. We encode the intended path as a query param
    // and redirect to the real index.html, which will restore the URL.
    // segmentsToKeep = 1 keeps the /satori-app prefix for project pages.
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
