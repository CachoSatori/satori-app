<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>satori-app</title>
    <script>
      // Restore the path encoded by 404.html for GitHub Pages SPA routing.
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script>
      // SW-WATCHDOG (incidente 06-12: clientes con service worker viejo/roto quedaban
      // colgados en el spinner tras un deploy; "borrar caché" no elimina SWs).
      // Si la app no marca arranque OK (__satoriBootOk, lo setea useAuth al resolver
      // la sesión) en 15s Y hay un SW controlando la página, se auto-sana UNA vez:
      // des-registra los SWs, vacía Cache Storage y recarga. El guard de sessionStorage
      // evita loops; IndexedDB (outbox offline y caché de datos) NO se toca.
      (function() {
        if (!('serviceWorker' in navigator)) return;
        setTimeout(function() {
          if (window.__satoriBootOk) return;
          if (sessionStorage.getItem('satori-sw-rescued')) return;
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (!regs.length && !navigator.serviceWorker.controller) return;
            sessionStorage.setItem('satori-sw-rescued', '1');
            Promise.all(regs.map(function(r) { return r.unregister(); }))
              .then(function() { return window.caches ? caches.keys() : []; })
              .then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); })
              .finally(function() { window.location.reload(); });
          }).catch(function() {});
        }, 15000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
